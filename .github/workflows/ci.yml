name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ZeroBudget.slnx

      - name: Build
        run: dotnet build ZeroBudget.slnx --no-restore -c Release

      # Tests use the EF Core in-memory provider, so no SQL Server is needed.
      - name: Test
        run: dotnet test ZeroBudget.slnx --no-build -c Release --verbosity normal

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      # Vitest unit + React Testing Library tests.
      - name: Test
        run: npm run test

      # Runs tsc type-check + vite production build.
      - name: Build
        run: npm run build

  a11y:
    name: a11y
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Drives the app in headless Chromium and asserts no axe-core WCAG 2.x A/AA
      # violations on each page, in both light and dark themes.
      - name: Accessibility (axe) checks
        run: npm run test:e2e

  # Flags dependencies with known security advisories on every PR/push. Not a required
  # status check (so a freshly-disclosed transitive advisory won't hard-block unrelated
  # work), but it shows red so it gets noticed; Dependabot opens the actual fix PRs.
  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ZeroBudget.slnx

      # `dotnet list --vulnerable` always exits 0, so detect advisories from its output.
      - name: NuGet vulnerable packages
        run: |
          set -o pipefail
          dotnet list ZeroBudget.slnx package --vulnerable --include-transitive 2>&1 | tee nuget-audit.txt
          if grep -q "has the following vulnerable packages" nuget-audit.txt; then
            echo "::error::Vulnerable NuGet packages found — see the log above."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: npm audit (client)
        working-directory: client
        run: npm audit --audit-level=high
