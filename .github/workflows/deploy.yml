name: Deploy

# Deploys to the production VPS when code lands on main (i.e. after a PR merge).
# Enable branch protection with the CI checks required so only green code reaches
# main; this workflow also rebuilds the release, so a broken build never ships.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys run at once.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: build release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      # Framework-dependent win-x64 publish. The .NET Hosting Bundle on the VPS
      # supplies the runtime + ASP.NET Core Module; publish emits the ANCM web.config.
      - name: Publish API
        run: >
          dotnet publish src/ZeroBudget.Api/ZeroBudget.Api.csproj
          -c Release -r win-x64 --no-self-contained -o publish/api

      - name: Build SPA
        working-directory: client
        # VITE_* vars are inlined into the bundle at build time, so the GA measurement ID
        # must be present here. Set it as a repo Variable (Settings → Secrets and variables
        # → Actions → Variables). Leaving it empty ships the app with analytics disabled.
        env:
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
        run: |
          npm ci
          npm run build

      - name: Assemble release package
        run: |
          mkdir -p release/api release/web
          cp -r publish/api/. release/api/
          cp -r client/dist/. release/web/
          cp deploy/web/web.config release/web/web.config
          cp deploy/Deploy.ps1 release/Deploy.ps1
          cd release && zip -qr ../release.zip . && cd ..

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: release.zip
          retention-days: 7

  deploy:
    name: deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production   # optional: add required reviewers in repo settings
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: release

      # Native OpenSSH (SFTP-based), NOT appleboy/scp-action: drone-scp pipes tar
      # through the remote shell, which fails against Windows OpenSSH + a PowerShell
      # default shell. Native scp/ssh use the SFTP subsystem and a single command,
      # which is shell-independent and works on Windows.
      - name: Write SSH key
        env:
          KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Copy release to VPS
        env:
          PORT: ${{ secrets.VPS_SSH_PORT }}
          USER: ${{ secrets.VPS_SSH_USER }}
          HOST: ${{ secrets.VPS_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key -P "$PORT" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            release.zip "$USER@$HOST:C:/deploy/incoming/release.zip"

      - name: Extract and deploy on VPS
        env:
          PORT: ${{ secrets.VPS_SSH_PORT }}
          USER: ${{ secrets.VPS_SSH_USER }}
          HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$USER@$HOST" \
            'powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item C:\deploy\staging\* -Recurse -Force -ErrorAction SilentlyContinue; Expand-Archive -Path C:\deploy\incoming\release.zip -DestinationPath C:\deploy\staging -Force; & C:\deploy\staging\Deploy.ps1"'
