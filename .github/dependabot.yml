# Dependabot keeps dependencies patched and opens security-fix PRs automatically.
# Covers the .NET packages, the React client's npm tree, and the GitHub Actions we pin.
# Minor/patch bumps are grouped into a single PR per ecosystem to cut noise; majors come
# as their own PRs so they can be reviewed individually.
version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dotnet-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
